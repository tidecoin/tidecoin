name: Check image exists
description: Verify that a Docker image exists in the registry.

inputs:
  registry:
    description: Container registry host.
    required: true
  registry_repo:
    description: Container registry repository or namespace.
    required: true
  image_name:
    description: Docker image name.
    required: true
  image_tag:
    description: Docker image tag.
    required: true

runs:
  using: composite
  steps:
    - name: Check image exists
      shell: bash
      env:
        CI_REGISTRY: ${{ inputs.registry }}
        CI_REGISTRY_REPO: ${{ inputs.registry_repo }}
        IMAGE_NAME: ${{ inputs.image_name }}
        IMAGE_TAG: ${{ inputs.image_tag }}
      run: |
        set -euo pipefail

        IMAGE="${CI_REGISTRY}/${CI_REGISTRY_REPO}/${IMAGE_NAME}:${IMAGE_TAG}"
        echo "Checking ${IMAGE}"

        if docker manifest inspect "${IMAGE}" >/dev/null 2>&1; then
          echo "Image exists"
          exit 0
        fi

        echo "Image does not exist: ${IMAGE}" >&2
        exit 1
